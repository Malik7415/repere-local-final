<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Google palette -->
    <linearGradient id="pinGrad" x1="362" y1="212" x2="678" y2="613" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EA4335"/>
      <stop offset="100%" stop-color="#FBBC05"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="516" y1="346" x2="746" y2="576" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>

    <linearGradient id="lensGrad" x1="534" y1="364" x2="650" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#D2E3FC"/>
    </linearGradient>

    <linearGradient id="barBlue" x1="445" y1="360" x2="445" y2="443" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#1A73E8"/>
    </linearGradient>
    <linearGradient id="barRed" x1="484" y1="331" x2="484" y2="443" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EA4335"/>
      <stop offset="100%" stop-color="#D93025"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="523" y1="304" x2="523" y2="443" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBC05"/>
      <stop offset="100%" stop-color="#F9AB00"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="561" y1="277" x2="561" y2="443" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#188038"/>
    </linearGradient>

    <filter id="shadowSoft" x="120" y="170" width="680" height="500" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <filter id="shadowLens" x="500" y="330" width="290" height="270" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Mark -->
  <g filter="url(#shadowSoft)">
    <!-- Pin -->
    <path d="M520 212C607 212 678 283 678 370C678 454 624 506 520 613C416 506 362 454 362 370C362 283 433 212 520 212Z" fill="url(#pinGrad)"/>

    <!-- Pin highlights -->
    <path d="M464 232C403 260 378 319 378 375C378 437 407 477 464 537C449 499 443 461 443 425C443 335 496 261 579 241C552 228 523 222 491 222C481 222 472 225 464 232Z" fill="#FFFFFF" fill-opacity="0.16"/>
    <path d="M529 220C608 223 663 280 662 353C658 343 649 331 636 322C638 267 596 232 529 220Z" fill="#FFFFFF" fill-opacity="0.18"/>

    <!-- Inner circle -->
    <circle cx="520" cy="372" r="107" fill="#FFFFFF"/>

    <!-- Analytics bars -->
    <g>
      <rect x="430" y="360" width="30" height="83" rx="4" fill="url(#barBlue)"/>
      <rect x="468" y="331" width="31" height="112" rx="4" fill="url(#barRed)"/>
      <rect x="507" y="304" width="31" height="139" rx="4" fill="url(#barYellow)"/>
      <rect x="545" y="277" width="32" height="166" rx="4" fill="url(#barGreen)"/>
      <circle cx="447" cy="393" r="15" fill="#FFFFFF" opacity="0.12"/>
      <circle cx="485" cy="377" r="17" fill="#FFFFFF" opacity="0.10"/>
      <circle cx="524" cy="355" r="20" fill="#FFFFFF" opacity="0.11"/>
      <path d="M528 443L538 443L538 324Q532 355 523 385Q520 394 517 402Q514 411 513 420Q512 431 514 443Z" fill="#FFF3C4" opacity="0.45"/>
    </g>
  </g>

  <!-- Magnifier -->
  <g filter="url(#shadowLens)">
    <circle cx="592" cy="422" r="76" fill="none" stroke="url(#ringGrad)" stroke-width="18"/>
    <circle cx="592" cy="422" r="58" fill="url(#lensGrad)"/>
    <circle cx="592" cy="422" r="52" fill="#FFFFFF" opacity="0.18"/>
    <path d="M559 388C548 402 545 418 548 433" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.58"/>
    <path d="M607 380C618 384 627 391 634 401" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.52"/>
    <rect x="637" y="476" width="109" height="34" rx="12" fill="url(#ringGrad)" transform="rotate(45 637 476)"/>
    <path d="M665 497L710 542" stroke="#185ABC" stroke-width="14" stroke-linecap="round" opacity="0.26"/>
  </g>
</svg>
